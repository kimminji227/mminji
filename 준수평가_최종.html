<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>법규 준수평가 체크리스트</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Apple SD Gothic Neo','Malgun Gothic',sans-serif;background:#fff;color:#111}
.wrap{padding:1rem 1rem 1.5rem}
.dept-tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:1.25rem}
.tab{font-size:13px;padding:6px 14px;border-radius:99px;border:1px solid #ccc;background:transparent;color:#666;cursor:pointer;transition:all .15s}
.tab.active{background:#111;color:#fff;border-color:#111}
.prog-row{display:flex;justify-content:space-between;font-size:13px;color:#666;margin-bottom:6px}
.pbar{height:5px;background:#eee;border-radius:99px;overflow:hidden;margin-bottom:1.25rem}
.pfill{height:100%;background:#1D9E75;border-radius:99px;transition:width .3s}
.law-block{border:1px solid #ddd;border-radius:10px;overflow:hidden;margin-bottom:1rem}
.law-hdr{display:flex;align-items:center;gap:8px;padding:9px 14px;background:#f5f5f5}
.law-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.law-name{font-size:13px;font-weight:500;color:#111;flex:1}
.law-badge{font-size:12px;color:#666}
.chk-item{border-top:1px solid #eee;background:#fff}
.chk-row{display:flex;align-items:flex-start;gap:10px;padding:10px 14px}
.chk-txt{flex:1;min-width:0}
.chk-q{font-size:13px;color:#111;line-height:1.5}
.chk-meta{display:flex;flex-wrap:wrap;gap:5px;margin-top:4px;align-items:center}
.law-ref{display:inline-block;font-size:11px;padding:2px 7px;border-radius:99px;border:1px solid #ddd;color:#666;background:#f5f5f5;white-space:nowrap}
.chk-hint{font-size:11px;color:#888}
.btn-grp{display:flex;gap:5px;flex-shrink:0}
.btn{font-size:12px;padding:4px 10px;border-radius:6px;border:1px solid #ccc;background:transparent;color:#666;cursor:pointer;transition:all .12s;white-space:nowrap}
.btn.y.on{background:#E1F5EE;border-color:#1D9E75;color:#085041;font-weight:500}
.btn.n.on{background:#FCEBEB;border-color:#A32D2D;color:#791F1F;font-weight:500}
.btn.na.on{background:#f5f5f5;border-color:#999;color:#111;font-weight:500}
.evidence-area{padding:8px 14px 12px;background:#f9f9f9;border-top:1px solid #eee;display:none}
.evidence-area.show{display:block}
.ev-label{font-size:11px;color:#666;margin-bottom:5px;font-weight:500}
.ev-row{display:flex;gap:8px;align-items:center;margin-bottom:6px;flex-wrap:wrap}
.ev-input{flex:1;font-size:12px;padding:5px 9px;border-radius:6px;border:1px solid #ccc;background:#fff;color:#111;min-width:0}
.ev-input:focus{outline:none;border-color:#999}
.ev-files{display:flex;flex-wrap:wrap;gap:5px;margin-top:4px}
.ev-file-tag{display:flex;align-items:center;gap:5px;font-size:11px;padding:3px 8px;border-radius:99px;background:#fff;border:1px solid #ccc;color:#111}
.ev-file-tag button{background:none;border:none;cursor:pointer;color:#666;font-size:12px;line-height:1;padding:0}
.ev-upload-btn{font-size:12px;padding:5px 10px;border-radius:6px;border:1px solid #ccc;background:#fff;color:#666;cursor:pointer;white-space:nowrap;display:inline-block}
.ev-status{font-size:11px;margin-top:4px}
.ev-status.ok{color:#0F6E56}
.ev-status.ng{color:#A32D2D}
.summary{border:1px solid #ddd;border-radius:10px;padding:1rem;background:#fff;margin-top:1.25rem}
.sum-title{font-size:13px;font-weight:500;color:#111;margin-bottom:10px}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.stat{background:#f5f5f5;border-radius:6px;padding:8px;text-align:center}
.stat-n{font-size:20px;font-weight:500}
.stat-l{font-size:11px;color:#666;margin-top:1px}
.ok .stat-n{color:#0F6E56}
.ng .stat-n{color:#A32D2D}
.warn .stat-n{color:#BA7517}

.act.s{background:#378ADD;border-color:#378ADD;color:#fff;font-weight:500}
.no-ev-badge{display:inline-block;font-size:10px;padding:1px 6px;border-radius:99px;background:#FAEEDA;border:1px solid #EF9F27;color:#633806;margin-left:6px;vertical-align:middle}
#notice-text{display:none;font-size:12px;color:#888;margin:-8px 0 12px}

</head>

<div class="pbar"><div class="pfill" id="pfill" style="width:0%"></div></div>
<div id="checklist"></div>

<div class="summary">
  <div class="sum-title">점검 결과 요약</div>
  <div class="stats">

  </div>
  <div class="acts">
    <button class="act" onclick="reset()">초기화</button>
    <button class="act s" onclick="exportSummary()">결과 내보내기 ↗</button>
  </div>
</div>
</div>

// 인덱스 기반 키 (법규명에 한글 포함시 충돌 방지)
const state = {};
DEPTS.forEach(d => d.laws.forEach((l, lIdx) => l.items.forEach((it, i) => {
  const k = d.id + '_' + lIdx + '_' + i;
  state[k] = {val:null, docno:'', files:[]};
})));

let cur = DEPTS[0].id;

function key(dId, lIdx, i){ return dId + '_' + lIdx + '_' + i; }

function tabs(){
  document.getElementById('tabs').innerHTML = DEPTS.map(d =>
    '<button class="tab ' + (d.id===cur?'active':'') + '" onclick="setDept(\'' + d.id + '\')">' + d.label + '</button>'
  ).join('');
}

function setDept(id){ cur=id; render(); }

function pick(k,v){
  state[k].val = state[k].val===v ? null : v;
  render();
}

function addFile(k, input){
  Array.from(input.files).forEach(function(f){
    var reader = new FileReader();
    reader.onload = function(e){
      state[k].files.push({id: Date.now() + Math.random(), name: f.name, data: e.target.result});
      render();
    };
    reader.readAsDataURL(f);
  });
  input.value='';
}

function removeFile(k, fid){
  fid = parseFloat(fid);
  state[k].files = state[k].files.filter(function(f){ return f.id !== fid; });
  render();
}

function evStatus(k){
  var s = state[k];
  if(!s || s.val===null || s.val==='na') return '';
  var hasEv = s.docno.trim()!=='' || s.files.length>0;
  if(s.val==='y' && hasEv) return '<div class="ev-status ok">증빙 첨부 완료</div>';
  if(s.val==='y' && !hasEv) return '<div class="ev-status ng">증빙 미첨부 — 문서번호 또는 파일을 등록해주세요</div>';
  if(s.val==='n') return '<div class="ev-status ng">부적합 — 조치 후 증빙을 첨부해주세요</div>';
  return '';
}

function render(){
  tabs();
  var dept = DEPTS.filter(function(d){ return d.id===cur; })[0];
  if(!dept){ return; }

  document.getElementById('notice-text').style.display = 'block';
  document.getElementById('dept-label').textContent = dept.label + ' 점검 항목';

  var allKeys = [];
  dept.laws.forEach(function(l, lIdx){
    l.items.forEach(function(_, i){ allKeys.push(key(dept.id, lIdx, i)); });
  });

  var done = allKeys.filter(function(k){ return state[k] && state[k].val!==null; }).length;
  var total = allKeys.length;
  document.getElementById('prog-txt').textContent = done + ' / ' + total + ' 완료';
  document.getElementById('pfill').style.width = (total ? Math.round(done/total*100) : 0) + '%';

  document.getElementById('checklist').innerHTML = dept.laws.map(function(l, lIdx){
    var answered = l.items.filter(function(_, i){ return state[key(dept.id,lIdx,i)] && state[key(dept.id,lIdx,i)].val!==null; }).length;
    var items = l.items.map(function(it, i){
      var k = key(dept.id, lIdx, i);
      var s = state[k] || {val:null, docno:'', files:[]};
      var v = s.val;
      var showEv = v==='y' || v==='n';
      var hasEv = s.docno.trim()!=='' || s.files.length>0;
      var noEvBadge = (v==='y' && !hasEv) ? '<span class="no-ev-badge">증빙 필요</span>' : '';
      var refs = it.refs.map(function(r){ return '<span class="law-ref">'+r+'</span>'; }).join('');
      var fileTags = s.files.map(function(f){
        return '<span class="ev-file-tag">' + f.name + '<button onclick="removeFile(\'' + k + '\',' + f.id + ')">×</button></span>';
      }).join('');
      var evBlock = showEv ? (
        '<div class="evidence-area show">' +
        '<div class="ev-label">증빙 자료 등록</div>' +
        '<div class="ev-row">' +
        '<input class="ev-input" type="text" placeholder="문서번호 또는 문서명 입력 (예: QE-2025-001)" value="' + s.docno + '" oninput="state[\'' + k + '\'].docno=this.value;updateSummary(null)" />' +
        '</div>' +
        '<div class="ev-row">' +
        '<label class="ev-upload-btn">파일 첨부<input type="file" multiple style="display:none" onchange="addFile(\'' + k + '\',this)"></label>' +
        '<span style="font-size:11px;color:#888;margin-left:4px">jpg·pdf·xlsx 등</span>' +
        '</div>' +
        (s.files.length>0 ? '<div class="ev-files">'+fileTags+'</div>' : '') +
        evStatus(k) +
        '</div>'
      ) : '';
      return '<div class="chk-item"><div class="chk-row"><div class="chk-txt"><div class="chk-q">' + it.q + noEvBadge + '</div><div class="chk-meta">' + refs + '<span class="chk-hint">' + it.h + '</span></div></div><div class="btn-grp"><button class="btn y ' + (v==='y'?'on':'') + '" onclick="pick(\'' + k + '\',\'y\')">적합</button><button class="btn n ' + (v==='n'?'on':'') + '" onclick="pick(\'' + k + '\',\'n\')">부적합</button><button class="btn na ' + (v==='na'?'on':'') + '" onclick="pick(\'' + k + '\',\'na\')">해당없음</button></div></div>' + evBlock + '</div>';
    }).join('');
    return '<div class="law-block"><div class="law-hdr"><div class="law-dot" style="background:' + l.color + '"></div><div class="law-name">' + l.name + '</div><div class="law-badge">' + answered + '/' + l.items.length + '</div></div>' + items + '</div>';
  }).join('');

  updateSummary(allKeys);
}

function updateSummary(allKeys){
  if(!allKeys){
    var dept = DEPTS.filter(function(d){ return d.id===cur; })[0];
    allKeys = [];
    dept.laws.forEach(function(l,lIdx){ l.items.forEach(function(_,i){ allKeys.push(key(dept.id,lIdx,i)); }); });
  }
  document.getElementById('s-ok').textContent = allKeys.filter(function(k){ return state[k] && state[k].val==='y'; }).length;
  document.getElementById('s-ng').textContent = allKeys.filter(function(k){ return state[k] && state[k].val==='n'; }).length;
  document.getElementById('s-noev').textContent = allKeys.filter(function(k){ return state[k] && state[k].val==='y' && state[k].docno.trim()==='' && state[k].files.length===0; }).length;
  document.getElementById('s-tot').textContent = allKeys.length;
}

function reset(){
  var dept = DEPTS.filter(function(d){ return d.id===cur; })[0];
  dept.laws.forEach(function(l,lIdx){ l.items.forEach(function(_,i){ state[key(dept.id,lIdx,i)]={val:null,docno:'',files:[]}; }); });
  render();
}

function exportSummary(){
  var dept = DEPTS.filter(function(d){ return d.id===cur; })[0];
  var today = new Date().toLocaleDateString('ko-KR');

  var body = '<div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:16px"><div><h2 style="margin-bottom:6px">법규 준수평가 결과 (' + dept.label + ')</h2><p style="font-size:13px;color:#666">점검일자: ' + today + '</p></div><table style="border-collapse:collapse;font-size:13px;text-align:center"><tr><th rowspan="2" style="border:1px solid #ccc;width:90px;vertical-align:middle;padding:6px">결재</th><th style="border:1px solid #ccc;padding:6px 18px">평가위원</th><th style="border:1px solid #ccc;padding:6px 18px">해당부서장</th></tr><tr><td style="border:1px solid #ccc;height:80px"></td><td style="border:1px solid #ccc"></td></tr></table></div><hr>';

  dept.laws.forEach(function(l, lIdx){
    body += '<h3 style="margin:16px 0 8px">' + l.name + '</h3><ul style="padding-left:20px">';
    l.items.forEach(function(it, i){
      var k = key(dept.id, lIdx, i);
      var s = state[k];
      var status = s.val==='y'?'적합':s.val==='n'?'부적합':s.val==='na'?'해당없음':'미평가';

      body += '<li style="margin-bottom:8px;line-height:1.6">[' + status + '] ' + it.q;

      if(s.docno) body += '<br>증빙: ' + s.docno;
      if(s.files.length>0) body += '<br>파일: ' + s.files.map(function(f){
        return '<a href="'+f.data+'" download="'+f.name+'">'+f.name+'</a>';
      }).join(', ');

      body += '</li>';
    });
    body += '</ul>';
  });

  var fullHtml = '<!DOCTYPE html><html lang="ko"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>법규점검결과_' + dept.label + '</title><style>body{font-family:-apple-system,BlinkMacSystemFont,sans-serif;padding:20px;max-width:800px;margin:0 auto}</style></head><body>' + body + '</body></html>';

  // ⭐ 카톡 감지
  var ua = navigator.userAgent.toLowerCase();
  var isKakao = ua.indexOf('kakaotalk') > -1;

  if(isKakao){
    alert("카카오톡에서는 다운로드가 제한될 수 있습니다.\nChrome 또는 Safari로 열어주세요.");

    var newWin = window.open();
    newWin.document.write(fullHtml);
    newWin.document.close();
    return;
  }

  // ⭐ 일반 브라우저 다운로드
  var blob = new Blob([fullHtml], {type:'text/html;charset=utf-8'});
  var url = URL.createObjectURL(blob);

  var a = document.createElement('a');
  a.href = url;
  a.download = '법규점검결과_' + dept.label + '_' + today + '.html';

  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);

  URL.revokeObjectURL(url);
}

render();
</script>
</body>
</html>
